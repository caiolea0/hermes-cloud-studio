<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes Command Center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0c;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(124,58,237,0.2);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 14px; color: #888; }
    .error { color: #ef4444; display: none; }
    .retry-btn {
      background: #7c3aed; color: white; border: none;
      padding: 8px 20px; border-radius: 8px; cursor: pointer;
      font-size: 13px; display: none;
    }
    .retry-btn:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Iniciando servidor...</div>
  <div class="error" id="error">Servidor não respondeu</div>
  <button class="retry-btn" id="retry" onclick="tryConnect()">Tentar novamente</button>

  <script>
    const DASHBOARD = 'http://localhost:8500';
    let attempts = 0;

    async function tryConnect() {
      attempts++;
      document.getElementById('status').textContent = `Conectando ao dashboard... (tentativa ${attempts})`;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('error').style.display = 'none';
      document.getElementById('retry').style.display = 'none';

      try {
        const res = await fetch(DASHBOARD + '/api/dashboard', { signal: AbortSignal.timeout(3000) });
        if (res.ok) {
          window.location.href = DASHBOARD;
          return;
        }
      } catch (e) {}

      if (attempts < 15) {
        setTimeout(tryConnect, 2000);
      } else {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('retry').style.display = 'block';
        attempts = 0;
      }
    }

    tryConnect();
  </script>
</body>
</html>
