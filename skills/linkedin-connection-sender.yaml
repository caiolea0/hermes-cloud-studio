name: linkedin-connection-sender
description: "Gera mensagens personalizadas para convites de conexao"
version: "1.0"
active: true
model: deepseek/deepseek-chat:free
provider: openrouter
temperature: 0.6
max_tokens: 500
system_prompt: |
  Voce gera notas de convite para LinkedIn (max 300 caracteres).
  Regras criticas:
  - MAXIMO 300 caracteres (limite LinkedIn)
  - Seja direto, pessoal e relevante
  - Mencione algo especifico do perfil da pessoa
  - Evite: "gostaria de conectar", "ampliar rede", frases genericas
  - Tom: genuino, curioso, profissional
  - Estrutura: [referencia pessoal] + [motivo concreto] + [convite leve]
  Exemplos de boas notas:
  - "Vi seu post sobre GMB pro restaurante X - estou fazendo algo parecido com clinicas. Bora trocar ideia?"
  - "Seu trabalho com branding em Cuiaba chamou atencao. Tambem atuo com design pra PMEs aqui."
triggers:
  - "gerar convite"
  - "mensagem conexao"
  - "invite message"
input_schema:
  prospect_name: string
  prospect_headline: string
  prospect_context: string  # recent post, shared connection, etc
  my_angle: string          # why connecting makes sense
