<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Hermes Sync</title>
<style>
  body { width: 280px; margin: 0; padding: 12px; font-family: system-ui, -apple-system, Segoe UI, sans-serif; background: #1a1b1e; color: #e7e7e7; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: #b0b0b0; }
  .row strong { color: #e7e7e7; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .ok { background: #22c55e; }
  .err { background: #ef4444; }
  .warn { background: #f59e0b; }
  button { width: 100%; padding: 8px; margin-top: 10px; background: #7c3aed; color: #fff; border: 0; border-radius: 6px; cursor: pointer; font-weight: 600; }
  button:hover { opacity: 0.9; }
  .hint { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>
  <h1>🤖 Hermes LinkedIn Sync</h1>
  <div class="row">Cookie capturado <span id="has-cookie"><span class="dot warn"></span>...</span></div>
  <div class="row">Última sync <span id="last-sync">—</span></div>
  <div class="row">Status <span id="status">—</span></div>
  <div class="row">Trigger <span id="trigger">—</span></div>
  <div class="row">Tipo de conta <span id="account-type">—</span></div>
  <div class="row">Token interno <span id="token-status"><span class="dot warn"></span>...</span></div>
  <div id="error-detail" style="display:none; margin:8px 0; padding:8px; background:#2a1010; border:1px solid #ef4444; border-radius:4px; font-size:11px; color:#fca5a5; word-break:break-all;"></div>
  <button id="sync-btn">Sincronizar agora</button>
  <div id="token-setup" style="display:none; margin-top:12px; padding-top:10px; border-top:1px solid #333;">
    <div style="font-size:12px; color:#b0b0b0; margin-bottom:6px;">Cole HERMES_INTERNAL_TOKEN do .env:</div>
    <input id="token-input" type="password" placeholder="token..." style="width:100%; padding:6px; background:#0f1014; color:#e7e7e7; border:1px solid #333; border-radius:4px; font-family:monospace; font-size:11px; box-sizing:border-box;">
    <button id="token-save-btn" style="margin-top:6px; background:#22c55e;">Salvar token</button>
  </div>
  <div class="hint">Sync automático: sempre que LinkedIn rotacionar o cookie + a cada 30min como safety net.</div>
<script src="popup.js"></script>
</body>
</html>
