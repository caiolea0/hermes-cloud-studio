# hermes-web — nginx para dashboard-v2 static + tiles pmtiles
# Bind: Tailscale IP only (via HERMES_BIND_IP no docker-compose).
# Range requests habilitado para HTTP 206 (requerido por MapLibre PMTiles protocol).

server {
    listen 8801;
    server_name _;
    charset utf-8;

    # Cabeçalhos de segurança mínimos (sem HSTS — Tailscale-only, HTTP)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Dashboard v2 SPA ──────────────────────────────────────────────────
    root /www/app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache: HTML nunca (SPA), assets com hash = longo
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location ~* \.(js|css|woff2|woff|ttf)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ── PMTiles: Range Requests (HTTP 206) ───────────────────────────────
    # MapLibre PMTiles protocol faz bytes= range requests no arquivo .pmtiles
    location /tiles/ {
        alias /www/tiles/;

        # Habilita byte-range responses
        add_header Accept-Ranges bytes always;

        # CORS permissivo (dashboard-v2 carrega de mesma origem, mas JS pode chamar fetch)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Cache de tiles: imutável (rebuilt com nome diferente)
        add_header Cache-Control "public, max-age=86400" always;

        types {
            application/x-protobuf pmtiles;
        }
    }

    # ── Compressão ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types
        text/css
        application/javascript
        application/json
        text/plain
        image/svg+xml;
    gzip_comp_level 6;
    gzip_min_length 1024;

    # ── Health probe ─────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Bloqueia dotfiles
    location ~ /\. {
        deny all;
    }
}
