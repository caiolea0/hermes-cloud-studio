    status: active            # F.5.2 — 8 tools wrapper sobre linkedin/* (BLACKLIST R2 intact)
    kind: custom
    chapter_owner: F.7
    required_by_dc: [F.7.done, F.9.done]
    transport: stdio
    command: python3
    args: ["mcps/hermes-linkedin/server.py"]
    cwd: "/home/hermes-gcp/.hermes"
    tools_preview:
