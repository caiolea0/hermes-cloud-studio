# Hermes ContextForge Gateway — upstream MCPs config
# F.5.2 update — 3 custom MCPs ACTIVE (era pending F.5.1)
# Status taxonomy: pending (not deployed) / active / deprecated / quarantine

gateway:
  bind_host: 127.0.0.1
  bind_port: 55401
  version: "0.1.0-f5.2"
  # OAuth 2.1 default ON for custom MCPs. Localhost loopback bypass (dev mode).
  # Production VM enforces OAuth even loopback when HERMES_STRICT_MCP=1.
  oauth_enabled: true
  oauth_bypass_loopback: true
  audit_log_path: "~/.hermes/logs/gateway_audit.jsonl"

# F.5.2 entrega: 3 custom MCPs ACTIVE com command/args wired
upstream_mcps:
  - name: hermes-linkedin
    status: active            # F.5.2 — 8 tools wrapper sobre linkedin/* (BLACKLIST R2 intact)
    kind: custom
    chapter_owner: F.7
    required_by_dc: [F.7.done, F.9.done]
    transport: stdio
    command: python3
    args: ["mcps/hermes-linkedin/server.py"]
    cwd: "/home/hermes-gcp/.hermes"
    tools_preview:
      - get_health
      - get_rate_limits
      - get_warmup_status
      - get_account_profile
      - assert_account_safe
      - preflight_check
      - probe_cooldown
      - start_campaign

  - name: hermes-prospects
    status: active            # F.5.2 — 7 tools CRUD + scoring local (D3 strict)
    kind: custom
    chapter_owner: F.7
    required_by_dc: [F.7.done, F.9.done]
    transport: stdio
    command: python3
    args: ["mcps/hermes-prospects/server.py"]
    cwd: "/home/hermes-gcp/.hermes"
    tools_preview:
      - search_prospects
      - score_lead
      - mark_converted
      - get_campaign_stats
      - enrich_pipeline
      - list_top_scored
      - get_by_status

  - name: hermes-skills
    status: active            # F.5.2 — 6 tools YAML mgmt + DB hybrid stub (D4)
    kind: custom
    chapter_owner: F.4
    required_by_dc: [F.4.done, F.9.done]
    transport: stdio
    command: python3
    args: ["mcps/hermes-skills/server.py"]
    cwd: "/home/hermes-gcp/.hermes"
    tools_preview:
      - list_skills
      - get_skill
      - toggle_active
      - propose_skill_yaml_stub
      - test_skill_dryrun
      - get_metrics

# F.5.6 entrega — public MCPs integration (GitHub/Sentry/Postgres/Playwright/Omnisearch/Hunter)
public_mcps_planned:
  - github            # F.4 PR-based deploy
  - sentry            # F.4 auto-disable + F.7 monitoring
  - postgres_pro      # F.6 Brain.decide read-only + F.5.2 hermes-prospects delegate (D3)
  - playwright_ms     # F.3 QA fallback
  - omnisearch        # F.7 discovery PME Cuiaba
  - hunter            # F.7 email verifier
