# Hermes ContextForge Gateway — upstream MCPs config
# F.5.1 scaffold — 3 custom placeholders (F.5.2 entrega real implementation)
# Status taxonomy: pending (not deployed) / active / deprecated / quarantine

gateway:
  bind_host: 127.0.0.1
  bind_port: 55401
  version: "0.1.0-f5.1"
  # OAuth 2.1 default ON for custom MCPs. Localhost loopback bypass (dev mode).
  # Production VM enforces OAuth even loopback when HERMES_STRICT_MCP=1.
  oauth_enabled: true
  oauth_bypass_loopback: true
  audit_log_path: "~/.hermes/logs/gateway_audit.jsonl"

