# Hermes ContextForge Gateway — upstream MCPs config
# F.5.2 update — 3 custom MCPs ACTIVE (era pending F.5.1)
# Status taxonomy: pending (not deployed) / active / deprecated / quarantine

gateway:
  bind_host: 127.0.0.1
  bind_port: 55401
  version: "0.4.0-f5.6"
  # OAuth 2.1 default ON for custom MCPs. Localhost loopback bypass (dev mode).
  # Production VM enforces OAuth even loopback when HERMES_STRICT_MCP=1.
  oauth_enabled: true
  oauth_bypass_loopback: true
  audit_log_path: "~/.hermes/logs/gateway_audit.jsonl"
  # F.5.3 — MCPClientPool TTL + max idle. STDIO subprocess reused per upstream.
  pool_ttl_seconds: 300
  pool_max_idle: 10

# F.5.2 entrega: 3 custom MCPs ACTIVE com command/args wired
upstream_mcps:
  - name: hermes-linkedin
    status: active            # F.5.2 — 8 tools wrapper sobre linkedin/* (BLACKLIST R2 intact)
    kind: custom
    chapter_owner: F.7
    required_by_dc: [F.7.done, F.9.done]
    transport: stdio
    command: python3
    args: ["mcps/hermes-linkedin/server.py"]
    cwd: "/home/hermes-gcp/.hermes"
    tools_preview:
      - get_health
      - get_rate_limits
      - get_warmup_status
      - get_account_profile
      - assert_account_safe
      - preflight_check
      - probe_cooldown
      - start_campaign

  - name: hermes-prospects
    status: active            # F.5.2 — 7 tools CRUD + scoring local (D3 strict)
    kind: custom
    chapter_owner: F.7
    required_by_dc: [F.7.done, F.9.done]
    transport: stdio
    command: python3
    args: ["mcps/hermes-prospects/server.py"]
    cwd: "/home/hermes-gcp/.hermes"
    tools_preview:
      - search_prospects
      - score_lead
      - mark_converted
      - get_campaign_stats
      - enrich_pipeline
      - list_top_scored
      - get_by_status

  - name: hermes-skills
    status: active            # F.5.2 — 6 tools YAML mgmt + DB hybrid stub (D4)
    kind: custom
    chapter_owner: F.4
    required_by_dc: [F.4.done, F.9.done]
    transport: stdio
    command: python3
    args: ["mcps/hermes-skills/server.py"]
    cwd: "/home/hermes-gcp/.hermes"
    tools_preview:
      - list_skills
      - get_skill
      - toggle_active
      - propose_skill_yaml_stub
      - test_skill_dryrun
      - get_metrics

  # F.5.6 D1 — 5 publics ACTIVE (Hunter deferred F.future per D1 cristalizado)
  - name: github
    status: active            # F.5.6a — GitHub PR-based skill deploy (F.4 Auto-Skill Loop W3)
    kind: public
    chapter_owner: F.4
    required_by_dc: [F.4]
    transport: stdio
    command: npx
    args: ["-y", "@modelcontextprotocol/server-github"]
    cwd: null
    auth_env: GITHUB_PERSONAL_ACCESS_TOKEN
    scope_notes: "F.4 PR-based deploy. PAT scope: repo + pull-request. Owner adiciona PAT em ~/.hermes/.env VM."
    tools_preview:
      - search_repositories
      - get_file_contents
      - create_or_update_file
      - create_pull_request
      - list_pull_requests
      - get_pull_request
      - merge_pull_request
      - create_issue
      - list_issues
      - search_code

# F.5.6 entrega — public MCPs integration (Hunter Firecrawl DEFERRED F.future per D1 D5)
public_mcps_planned:
  - hunter            # F.7 email verifier — DEFERRED F.future (per D1 cristalizado)
  - firecrawl         # DEFERRED F.future (per D5 — Omnisearch cobre web search F.6)
